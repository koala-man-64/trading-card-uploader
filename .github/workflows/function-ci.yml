name: function-ci

on:
  pull_request:
    paths:
      - "api-sas-issuer/**"
      - ".github/workflows/function-ci.yml"
  push:
    branches: [main]
    paths:
      - "api-sas-issuer/**"
      - ".github/workflows/function-ci.yml"
  workflow_dispatch:
    inputs:
      deployDev:
        description: "Deploy the SAS issuer to the dev Function App"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            api-sas-issuer/requirements.txt
            api-sas-issuer/requirements-dev.txt
      - name: Install dependencies
        working-directory: api-sas-issuer
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Static checks
        working-directory: api-sas-issuer
        run: |
          python -m ruff check .
          python -m mypy .
      - name: Unit tests
        working-directory: api-sas-issuer
        run: python -m pytest -q --cov=shared --cov=function_app
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: function-test-output
          path: api-sas-issuer/.coverage

  deploy-dev:
    if: github.event_name == 'workflow_dispatch' && inputs.deployDev == 'true'
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install app dependencies into package folder
        working-directory: api-sas-issuer
        run: python -m pip install -r requirements.txt --target=".python_packages/lib/site-packages"
      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          package: api-sas-issuer
