name: infra-ci

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-ci.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra-ci.yml"
  workflow_dispatch:
    inputs:
      deployDev:
        description: "Deploy dev infrastructure after what-if"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: azure/cli@v2
        with:
          inlineScript: az bicep build --file infra/main.bicep

  what-if-dev:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: What-if dev deployment
        run: |
          az deployment group what-if \
            --name trading-card-uploader-dev \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters \
              env=dev \
              entraTenantId="${{ vars.AZURE_TENANT_ID }}" \
              apiClientId="${{ vars.API_CLIENT_ID }}" \
              apiAppIdUri="${{ vars.API_APP_ID_URI }}" \
              allowedAndroidClientIds='["${{ vars.ANDROID_CLIENT_ID }}"]' \
              githubSmokePrincipalId="${{ vars.GITHUB_SMOKE_PRINCIPAL_ID }}"

  deploy-dev:
    if: github.event_name == 'workflow_dispatch' && inputs.deployDev == 'true'
    needs: what-if-dev
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy dev infrastructure
        run: |
          az deployment group create \
            --name trading-card-uploader-dev \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters \
              env=dev \
              entraTenantId="${{ vars.AZURE_TENANT_ID }}" \
              apiClientId="${{ vars.API_CLIENT_ID }}" \
              apiAppIdUri="${{ vars.API_APP_ID_URI }}" \
              allowedAndroidClientIds='["${{ vars.ANDROID_CLIENT_ID }}"]' \
              githubSmokePrincipalId="${{ vars.GITHUB_SMOKE_PRINCIPAL_ID }}" \
            > dev-deployment.json
      - name: Export dev deployment outputs
        run: |
          jq '.properties.outputs' dev-deployment.json > dev-deployment-outputs.json
      - name: Upload dev deployment outputs
        uses: actions/upload-artifact@v4
        with:
          name: dev-deployment-outputs
          retention-days: 7
          path: dev-deployment-outputs.json
