name: android-ci

on:
  pull_request:
    paths:
      - "android-app/**"
      - ".github/workflows/android-ci.yml"
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/android-ci.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Validate Android module exists
        shell: bash
        run: test -f android-app/settings.gradle.kts
      - name: Lint and unit test
        run: gradle -p android-app ktlintCheck detekt lintDebug testDebugUnitTest
      - name: Assemble debug APK
        run: gradle -p android-app assembleDebug
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            android-app/app/build/reports/**
            android-app/app/build/test-results/**
