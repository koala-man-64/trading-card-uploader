openapi: 3.0.3
info:
  title: Trading Card Upload SAS API
  version: 0.1.0
paths:
  /api/healthz:
    get:
      summary: Service health
      responses:
        "200":
          description: Service is healthy.
  /api/v1/uploads/sas:
    post:
      summary: Issue a scoped upload SAS URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadSasRequest"
      responses:
        "200":
          description: SAS URL issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSasResponse"
        "400":
          description: Invalid request.
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: Token lacks required authorization.
        "409":
          description: Idempotency conflict.
        "413":
          description: Upload is too large.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UploadSasRequest:
      type: object
      required:
        - clientUploadId
        - contentType
        - contentLengthBytes
      properties:
        clientUploadId:
          type: string
          format: uuid
        contentType:
          type: string
          enum:
            - image/jpeg
            - image/heic
        contentLengthBytes:
          type: integer
          minimum: 1
          maximum: 10485760
        sha256Hex:
          type: string
          pattern: "^[a-fA-F0-9]{64}$"
    UploadSasResponse:
      type: object
      required:
        - uploadId
        - blobName
        - uploadUrl
        - expiresAtUtc
        - requiredHeaders
        - maxContentLengthBytes
      properties:
        uploadId:
          type: string
          format: uuid
        blobName:
          type: string
        uploadUrl:
          type: string
          format: uri
        expiresAtUtc:
          type: string
          format: date-time
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
          example:
            x-ms-blob-type: BlockBlob
            x-ms-version: "2021-08-06"
            Content-Type: image/jpeg
        maxContentLengthBytes:
          type: integer
